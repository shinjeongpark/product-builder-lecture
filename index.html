<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-App Suite (Game & Calculator)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="light">
    <div class="top-bar">
        <nav class="app-selector">
            <button class="nav-btn active" data-app="anipang">Anipang</button>
            <button class="nav-btn" data-app="calculator">Calculator</button>
        </nav>
        <div class="theme-switch-wrapper">
            <button id="theme-toggle">Dark Mode</button>
        </div>
    </div>

    <header>
        <h1 id="app-title">Anipang Puzzle</h1>
    </header>

    <main id="app-viewport">
        <!-- Anipang Content (Default) -->
        <div id="anipang-view">
            <div class="game-info">
                <div class="info-item">Score: <span id="score">0</span></div>
                <div class="info-item">Time: <span id="timer">60</span>s</div>
            </div>
            <div id="game-container">
                <anipang-game id="anipang"></anipang-game>
            </div>
            <div id="game-over" class="hidden">
                <h2>Game Over!</h2>
                <p>Your Score: <span id="final-score">0</span></p>
                <button id="restart-btn">Restart Game</button>
            </div>
        </div>

        <!-- Calculator Content (Hidden) -->
        <div id="calculator-view" class="hidden">
            <simple-calculator></simple-calculator>
        </div>
    </main>
    <script src="main.js"></script>
</body>
</html>
