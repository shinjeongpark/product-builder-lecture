<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omok (Gomoku) Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="light">
    <div class="theme-switch-wrapper">
        <button id="theme-toggle">Dark Mode</button>
    </div>

    <header>
        <h1>Omok (Gomoku)</h1>
        <div id="game-status">Black's Turn</div>
    </header>

    <main>
        <omok-game id="omok-board"></omok-game>
        <div class="controls">
            <button id="restart-btn">Restart Game</button>
        </div>
    </main>

    <div id="win-modal" class="hidden">
        <div class="modal-content">
            <h2 id="winner-text">Black Wins!</h2>
            <button id="modal-restart-btn">Play Again</button>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
